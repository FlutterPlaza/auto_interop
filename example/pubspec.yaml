name: auto_interop_example
description: Example project demonstrating auto_interop usage with npm, CocoaPods, and Gradle packages.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.0.0
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  auto_interop:
    path: ../packages/auto_interop

dev_dependencies:
  flutter_test:
    sdk: flutter
  auto_interop_generator:
    path: ../packages/auto_interop_generator
  build_runner: ^2.4.0
