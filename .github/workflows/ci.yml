name: CI

on:
  push:
    branches: [main]
    tags:
      - 'auto_interop-v*'
      - 'auto_interop_generator-v*'
  pull_request:
    branches: [main]

jobs:
  generator:
    name: Generator package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/auto_interop_generator
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get --no-example

      - name: Check formatting
        run: dart format --set-exit-if-changed --output none lib bin test

      - name: Analyze
        run: dart analyze --fatal-warnings lib bin test

      - name: Run tests
        run: dart test --timeout 120s --exclude-tags integration

      - name: Dry-run publish
        run: dart pub publish --dry-run

  runtime:
    name: Runtime package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/auto_interop
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get --no-example

      - name: Check formatting
        run: dart format --set-exit-if-changed --output none lib test

      - name: Analyze
        run: dart analyze --fatal-warnings lib test

      - name: Run tests
        run: flutter test

      - name: Dry-run publish
        run: flutter pub publish --dry-run

  # Publish auto_interop (runtime) first — generator depends on it
  publish-runtime:
    name: Publish auto_interop
    needs: [runtime, generator]
    if: startsWith(github.ref, 'refs/tags/auto_interop-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: packages/auto_interop
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub publish --force

  # Publish auto_interop_generator second
  publish-generator:
    name: Publish auto_interop_generator
    needs: [runtime, generator]
    if: startsWith(github.ref, 'refs/tags/auto_interop_generator-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: packages/auto_interop_generator
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub publish --force

  # Deploy documentation to GitHub Pages
  pages:
    name: Deploy docs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
