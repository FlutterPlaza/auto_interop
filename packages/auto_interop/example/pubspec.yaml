name: auto_interop_example
description: >
  Demonstrates auto_interop runtime features: platform channels, native objects,
  event streams, callbacks, lifecycle management, and error handling.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.0.0
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  auto_interop:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  auto_interop_generator:
    path: ../../auto_interop_generator
  integration_test:
    sdk: flutter
